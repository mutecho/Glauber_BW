# v3pt-bins = 0.0,0.2,0.4,0.6,0.8,1.2,2.0,3.0
# flowpt-output-mode = same-file
# flowpt-output = test_b8_5000e_cfgfile_flowpt.root  # only with separate-file mode

# Optional QA-facing tuning knobs
flow-trans-rho0 = 0.9
kappa2 = 0.06
flow-trans-profile-power = 1.0
flow-velocity-sampler = covariance-ellipse
density-evolution = none
flow-density-sigma = 0.5
# debug-flow-ellipse = false
sigma-eta = 1.5
eta-plateau = 1.0
nbd-mu = 2.0
nbd-k = 1.5
debug-flow-ellipse = false
