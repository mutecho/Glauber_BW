# Example blast-wave generator config.
# Relative output paths resolve against this file's directory.

nevents = 5000
b = 8
temperature = 0.2
thermal-sampler = maxwell-juttner
#or gamma
progress = true
# mj-pmax = 8.0
# mj-grid-points = 4096
tau0 = 10.0
smear = 0.5
sigma-nn = 7.0
seed = 12345
output = /Users/allenzhou/Research_software/Blast_wave/qa/test_b8_5000e_ellipse.root
v2pt-bins = 0.0,0.2,0.4,0.6,0.8,1.2,1.6,2.0,3.0,4.0,5.0,7.0
v3pt-bins = 0.0,0.2,0.4,0.6,0.8,1.2,1.6,2.0,3.0,4.0,5.0,7.0
flowpt-output-mode = same-file
