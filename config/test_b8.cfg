# Example blast-wave generator config.
# Relative output paths resolve against this file's directory.

nevents = 5000
b = 8
temperature = 0.2
thermal-sampler = maxwell-juttner
#or gamma
progress = true
# mj-pmax = 8.0
# mj-grid-points = 4096
tau0 = 10.0
smear = 0.5
sigma-nn = 7.0
seed = 12345
output = test_b8_5000e_cfgfile.root

# Optional QA-facing tuning knobs
rho0 = 0.9
kappa2 = 0.06
flow-power = 1.0
flow-velocity-sampler = covariance-ellipse
density-evolution = affine-gaussian
flow-density-sigma = 0.5
# V2 gradient-response (opt-in): set both modes to gradient-response.
# flow-velocity-sampler = gradient-response
# density-evolution = gradient-response
# gradient-sigma-em = 0.0
# gradient-sigma-dyn = 1.0
# gradient-density-floor-fraction = 1.0e-4
# gradient-density-cutoff-fraction = 1.0e-6
# gradient-displacement-max = 1.5
# gradient-displacement-kappa = 1.0  # fm
# gradient-diffusion-sigma = 0.0
# gradient-vmax = 0.75
# gradient-velocity-kappa = 1.0  # fm
# cooper-frye-weight = none
# debug-flow-ellipse = false
# debug-gradient-response = false
sigma-eta = 1.5
eta-plateau = 1.0
nbd-mu = 2.0
nbd-k = 1.5
debug-flow-ellipse = false
debug-gradient-response = false
