# 完整 flowpt 示例配置；每个配置项前一行是中文解释。
# 相对输出路径会按本配置文件所在目录解析。

# 生成事件数；短烟测可用 CLI 覆盖为更小数值，例如 --nevents 20。
nevents = 5000

# 固定冲量参数 b，单位 fm。
b = 8

# 局域静止系热温度，单位 GeV。
temperature = 0.2

# 热动量抽样器；maxwell-juttner 是当前默认热采样模式，gamma 只保留作对照。
thermal-sampler = maxwell-juttner

# 是否显示生成进度；true 会在终端输出进度条。
progress = true

# Maxwell-Juttner 查表的最大动量，单位 GeV；默认值通常足够，按需取消注释。
# mj-pmax = 8.0

# Maxwell-Juttner 查表网格点数；默认值通常足够，按需取消注释。
# mj-grid-points = 4096

# freeze-out proper time，单位 fm/c。
tau0 = 10.0

# legacy hotspot 横向 smear 宽度，单位 fm。
smear = 0.5

# 核子-核子非弹截面，单位 fm^2。
sigma-nn = 7.0

# 随机数种子；固定后便于复现实例输出。
seed = 12345

# 主 ROOT 输出文件；这里用相对路径，实际写到仓库 qa/test_b8_flowpt.root。
output = ../qa/test_b8_flowpt.root

# 差分 v2{2}(pT) 的 pT bin 边界；设置后主文件总会写 v2_2_pt_edges。
v2pt-bins = 0.0,0.2,0.4,0.6,0.8,1.2,1.6,2.0,3.0,4.0,5.0,7.0

# 差分 v3{2}(pT) 的 pT bin 边界；设置后主文件总会写 v3_2_pt_edges。
v3pt-bins = 0.0,0.2,0.4,0.6,0.8,1.2,1.6,2.0,3.0,4.0,5.0,7.0

# 差分 flow pT payload 写入模式；same-file 把启用的 v2/v3 histogram 和 canvas 写回主 ROOT 文件，separate-file 写到 flowpt-output 指定的独立 ROOT 文件。
flowpt-output-mode = same-file

# separate-file 模式下的输出路径；启用时 v2/v3 会一起写入这个文件，same-file 模式不应设置该项。
# flowpt-output = ../qa/test_b8_flowpt_only.root

# baseline 平均横向流强 rapidity。
rho0 = 0.9

# 二阶几何响应流强；covariance-ellipse 和 density-normal 补偿路径会使用。
kappa2 = 0.06

# 横向流径向 profile 的幂指数。
flow-power = 1.0

# 横向流速度方向采样器；covariance-ellipse 是当前默认路径。
flow-velocity-sampler = covariance-ellipse

# 介质密度演化模式；none 是 legacy 对照，affine-gaussian 是当前内建默认。
density-evolution = none

# density-normal 或 affine-gaussian 路径的 Gaussian density 沉积宽度，单位 fm。
flow-density-sigma = 0.5

# affine-gaussian 中短轴 in-plane 方向的几何膨胀因子。
affine-lambda-in = 1.20

# affine-gaussian 中长轴 out-of-plane 方向的几何膨胀因子。
affine-lambda-out = 1.05

# affine-gaussian density 平滑/演化宽度，单位 fm。
affine-sigma-evo = 0.5

# density-normal 的 kappa2 补偿开关；只对 affine-gaussian + density-normal 有意义。
# density-normal-kappa-compensation = false

# V2 gradient-response 需要同时把 density-evolution 和 flow-velocity-sampler 设为 gradient-response。
# flow-velocity-sampler = gradient-response

# V2 gradient-response 介质演化模式；必须与上面的 flow-velocity-sampler 联合使用。
# density-evolution = gradient-response

# gradient-response 的 marker 发射密度平滑宽度，单位 fm。
# gradient-sigma-em = 0.0

# gradient-response 的 dynamics density 平滑宽度，单位 fm。
# gradient-sigma-dyn = 1.0

# gradient-response 的密度 floor 比例，用于数值稳定。
# gradient-density-floor-fraction = 1.0e-4

# gradient-response 的密度 cutoff 比例，用于截断极低密度尾部。
# gradient-density-cutoff-fraction = 1.0e-6

# gradient-response 的最大位移，单位 fm。
# gradient-displacement-max = 1.5

# gradient-response 位移响应系数，单位 fm。
# gradient-displacement-kappa = 1.0

# gradient-response 位移后的扩散宽度，单位 fm。
# gradient-diffusion-sigma = 0.0

# gradient-response 最大横向速度。
# gradient-vmax = 0.75

# gradient-response 速度响应系数，单位 fm。
# gradient-velocity-kappa = 1.0

# Cooper-Frye 权重模式；none 使用当前默认单位发射权重，mt-cosh 为 opt-in 对照。
# cooper-frye-weight = none

# flow ellipse debug payload 开关；false 时不写额外 debug tree/histogram。
debug-flow-ellipse = false

# gradient-response debug histogram 开关；只有 gradient-response 路径下才有意义。
debug-gradient-response = false

# 初态几何 debug density map 开关；false 时不写 initial_geometry_density_x-y。
debug-initial-geometry = false

# 纵向 eta_s Gaussian 宽度。
sigma-eta = 1.5

# 纵向 plateau 半宽。
eta-plateau = 1.0

# 负二项 multiplicity 模型的平均参数。
nbd-mu = 2.0

# 负二项 multiplicity 模型的 k 参数。
nbd-k = 1.5
