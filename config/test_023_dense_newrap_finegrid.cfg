# 三阶响应测试 V1 示例配置。
# 每个配置项前一行说明该项含义；配置值在下一行给出。
# 该文件使用 response-test-023 人工初态模板；默认 Glauber 流程不受影响。

# 说明：生成事件数；可在命令行用 --nevents 覆盖。
nevents = 5000

# 说明：初态几何来源；glauber 使用默认 Monte Carlo Glauber，response-test-023 使用 0+2+3 人工模板。
initial-geometry = response-test-023

# 说明：人工模板横向源点总数；response-test-023 会按 1:A2:A3 分配到圆形背景、椭圆分量和三角 hotspot 分量。
initial-geometry-source-count = 300

# 说明：n=0 圆形背景的高斯宽度，单位 fm。
initial-geometry-r0 = 1.8

# 说明：n=2 椭圆模板权重；它不是 epsilon2，最终分析应使用输出的 eps2。
initial-geometry-a2 = 0.5

# 说明：n=2 椭圆高斯在局域 x 主轴方向的宽度，单位 fm；与 r2y 联合定义椭圆形状。
initial-geometry-r2x = 2.4

# 说明：n=2 椭圆高斯在局域 y 主轴方向的宽度，单位 fm；与 r2x 联合定义椭圆形状。
initial-geometry-r2y = 1.3

# 说明：n=2 椭圆模板方向角，单位 rad；只在 initial-geometry-a2 大于 0 时显著影响模板。
initial-geometry-phi2 = 0.0

# 说明：n=3 三角 hotspot 模板权重；它不是 epsilon3，最终分析应使用输出的 eps3。
initial-geometry-a3 = 0.20

# 说明：三个三角 hotspot 中心到原点的半径，单位 fm；与 sigma3 联合控制三角结构清晰度。
initial-geometry-r3 = 2.0

# 说明：每个三角 hotspot 的高斯宽度，单位 fm；越小三角热点越集中。
# initial-geometry-sigma3 = 0.45
initial-geometry-sigma3 = 1.2

# 说明：n=3 三角模板方向角，单位 rad；三个 hotspot 位于 phi3、phi3+2pi/3、phi3+4pi/3。
initial-geometry-phi3 = 0.0

# 说明：是否写首个有效事件的 initial_geometry_density_x-y 调试 TH2；响应测试建议开启。
debug-initial-geometry = true

# 说明：固定冲量参数 b，单位 fm；模板模式下仍写入 events.b 和 centrality，便于和默认运行保持同一输出形状。
b = 8

# 说明：局域静止系温度，单位 GeV。
temperature = 0.2

# 说明：热动量抽样器；maxwell-juttner 是当前默认，gamma 仅用于兼容对照。
thermal-sampler = maxwell-juttner

# 说明：Maxwell-Juttner 动量查表上限，单位 GeV。
mj-pmax = 8.0

# 说明：Maxwell-Juttner 查表网格点数。
mj-grid-points = 4096

# 说明：固定 freeze-out proper time，单位 fm/c。
tau0 = 10.0

# 说明：identity 介质下 participant hotspot 的横向 smear 宽度；本配置使用 density-normal + none 时保留此发射展宽。
smear = 0.5

# 说明：核子-核子非弹截面参数，单位 fm^2；模板模式不用于源点生成，但保留完整配置契约。
sigma-nn = 7.0

# 说明：随机数种子；固定后人工模板和发射抽样可复现。
seed = 12345

# 说明：输出 ROOT 文件路径。
output = /Users/allenzhou/Research_software/Blast_wave/qa/test_023_newrap_fine.root

# 说明：是否显示生成进度。
progress = true

# 说明：可选 v2{2}(pT) 分析的 pT bin 边界；同一行多个数值按逗号分隔，必须严格递增。
v2pt-bins = 0.0,0.2,0.4,0.6,0.8,1.2,1.6,2.0,3.0,4.0

# 说明：可选 v3{2}(pT) 分析的 pT bin 边界；可以和 v2pt-bins 联合使用，也可以单独使用。
v3pt-bins = 0.0,0.2,0.4,0.6,0.8,1.2,1.6,2.0,3.0,4.0

# 说明：差分 flow pT payload 写入模式；same-file 写入主 ROOT 文件，separate-file 把启用的 v2/v3 一起写入独立文件。
flowpt-output-mode = same-file

# 说明：separate-file 模式下的差分 flow 输出路径；same-file 模式不应设置该项。
# flowpt-output = /Users/allenzhou/Research_software/Blast_wave/qa/test_b8_response_023_flowpt.root

# 说明：横向平均流快度基线；density-normal 下决定流强尺度。
# flow-trans-rho0 = 3
flow-trans-rho0 = 0.9

# flow-trans-magnitude-mode = radius-profile | shell-gradient-corrected
flow-trans-magnitude-mode = radius-profile

# 说明：density-normal 方向中 density-gradient 外向方向的权重；0 为纯几何径向，1 为纯密度梯度方向，中间值为归一化混合。
flow-trans-direction-gradient-fraction = 0.8

# 说明：横向流强使用的归一化半径；可选 covariance、density-percentile:<p>、density-level:<fraction>。
flow-trans-radius = density-percentile:0.95

# 说明：density-defined flow-trans 半径 profile 的数值分辨率；balanced 为推荐默认，precise 复现旧 360x512，fast 用于大统计预扫。
flow-trans-radius-resolution = precise
# flow-trans-radius-resolution = fast
# flow-trans-radius-resolution = balanced

# 说明：横向流强随归一化半径 rTilde 的幂指数。
flow-trans-profile-power = 1.2

# 说明：横向流速度来源；三角响应测试建议先用 density-normal，让流方向来自初态密度梯度。
flow-velocity-sampler = density-normal

# 说明：介质演化模式；response-test-023 首轮 closure 建议使用 none，避免 affine-gaussian 的二阶闭合掩盖三角响应。
density-evolution = none

# 说明：Gaussian point-cloud density 的沉积宽度，单位 fm；density-normal 会用它计算密度梯度。
flow-density-sigma = 0.5

# 说明：是否写 flow_ellipse_debug 与归一化 participant 图。
debug-flow-ellipse = false

# 说明：可选 Cooper-Frye 风格分析权重；none 表示 emission_weight 保持单位权重。
cooper-frye-weight = none

# 说明：纵向 eta_s 高斯尾宽度。
sigma-eta = 1.5

# 说明：纵向 eta_s 平顶核心半宽。
eta-plateau = 1.0

# 说明：每个源点的平均发射强度。
nbd-mu = 2.0

# 说明：NBD-like Gamma-Poisson 涨落的形状参数。
nbd-k = 1.5
