# density-normal flow-trans 第一阶段示例配置。
# 每个配置项前一行说明该项含义；配置值在下一行给出。
# 本配置演示新的 flow-trans-* 横向流层，旧 rho0 / flow-power 名称不再使用。

# 说明：生成事件数；可在命令行用 --nevents 覆盖。
nevents = 5000

# 说明：初态几何来源；glauber 使用默认 Monte Carlo Glauber，response-test-023 使用 0+2+3 人工模板。
initial-geometry = glauber

# 说明：人工模板横向源点总数；仅 initial-geometry=response-test-023 时用于生成源点。
initial-geometry-source-count = 600

# 说明：response-test-023 的 n=0 圆形背景高斯宽度，单位 fm；glauber 模式下不使用。
initial-geometry-r0 = 1.8

# 说明：response-test-023 的 n=2 椭圆模板权重；它不是最终输出的 eps2。
initial-geometry-a2 = 0.0

# 说明：response-test-023 的 n=2 椭圆高斯局域 x 主轴宽度，单位 fm。
initial-geometry-r2x = 2.4

# 说明：response-test-023 的 n=2 椭圆高斯局域 y 主轴宽度，单位 fm。
initial-geometry-r2y = 1.3

# 说明：response-test-023 的 n=2 椭圆模板方向角，单位 rad。
initial-geometry-phi2 = 0.0

# 说明：response-test-023 的 n=3 三角 hotspot 模板权重；它不是最终输出的 eps3。
initial-geometry-a3 = 0.0

# 说明：response-test-023 三个三角 hotspot 中心到原点的半径，单位 fm。
initial-geometry-r3 = 2.0

# 说明：response-test-023 每个三角 hotspot 的高斯宽度，单位 fm。
initial-geometry-sigma3 = 0.8

# 说明：response-test-023 三角模板方向角，单位 rad。
initial-geometry-phi3 = 0.0

# 说明：是否写首个有效事件的 initial_geometry_density_x-y 调试 TH2；glauber 基线默认关闭。
debug-initial-geometry = false

# 说明：固定冲量参数 b，单位 fm。
b = 8

# 说明：局域静止系温度，单位 GeV。
temperature = 0.2

# 说明：热动量抽样器；maxwell-juttner 是当前默认，gamma 仅用于兼容对照。
thermal-sampler = maxwell-juttner

# 说明：Maxwell-Juttner 动量查表上限，单位 GeV。
mj-pmax = 8.0

# 说明：Maxwell-Juttner 查表网格点数。
mj-grid-points = 4096

# 说明：固定 freeze-out proper time，单位 fm/c。
tau0 = 10.0

# 说明：identity 介质下 participant hotspot 的横向 smear 宽度；affine-gaussian 密度场发射主要由 flow-density-sigma 控制。
smear = 0.5

# 说明：核子-核子非弹截面参数，单位 fm^2。
sigma-nn = 7.0

# 说明：随机数种子；固定后 Glauber 和发射抽样可复现。
seed = 12345

# 说明：输出 ROOT 文件路径。
output = /Users/allenzhou/Research_software/Blast_wave/qa/test_b8_density_normal_flow_trans.root

# 说明：是否显示生成进度。
progress = true

# 说明：可选 v2{2}(pT) 分析的 pT bin 边界；本 flow-trans smoke 配置默认关闭，低统计验证时避免把半径测试和差分 cumulant 统计耦合。
# v2pt-bins = 0.0,0.2,0.4,0.6,0.8,1.2,1.6,2.0,3.0,4.0,5.0,7.0

# 说明：可选 v3{2}(pT) 分析的 pT bin 边界；需要做差分 flow 验证时再与 v2pt-bins 一起取消注释。
# v3pt-bins = 0.0,0.2,0.4,0.6,0.8,1.2,1.6,2.0,3.0,4.0,5.0,7.0

# 说明：差分 flow pT payload 写入模式；只有取消注释 v2pt-bins 或 v3pt-bins 后才能启用。
# flowpt-output-mode = same-file

# 说明：separate-file 模式下的差分 flow 输出路径；same-file 模式不应设置该项。
# flowpt-output = /Users/allenzhou/Research_software/Blast_wave/qa/test_b8_density_normal_flow_trans_flowpt.root

# 说明：横向平均流快度基线；新公开名称为 flow-trans-rho0，旧 rho0 会直接报错。
flow-trans-rho0 = 0.9

# 说明：二阶显式响应系数；名称保持 kappa2，不属于本轮 flow-trans 改名。
kappa2 = 0.06

# 说明：横向流强随归一化半径的幂指数；新公开名称为 flow-trans-profile-power，旧 flow-power 会直接报错。
flow-trans-profile-power = 1.0

# 说明：横向流速度来源；本配置选择 density-normal，才能使用方向混合和 density-defined 半径。
flow-velocity-sampler = density-normal

# 说明：介质演化模式；affine-gaussian 是当前默认 V1a 响应层，并提供 freeze-out emissionDensity。
density-evolution = affine-gaussian

# 说明：Gaussian point-cloud density 的沉积宽度，单位 fm；density-normal 用它计算发射密度梯度。
flow-density-sigma = 0.5

# 说明：density-normal 方向中 density-gradient 外向方向的权重；0 为纯几何径向，1 为纯密度梯度方向，中间值为归一化混合。
flow-trans-direction-gradient-fraction = 1.0

# 说明：横向流强使用的归一化半径；可选 covariance、density-percentile:<p>、density-level:<fraction>。
flow-trans-radius = density-percentile:0.95

# 说明：density-defined flow-trans 半径 profile 的数值分辨率；balanced 为推荐默认，precise 复现旧 360x512，fast 用于大统计预扫。
flow-trans-radius-resolution = balanced

# 说明：affine-gaussian 短轴 in-plane 方向的几何膨胀因子。
affine-lambda-in = 1.20

# 说明：affine-gaussian 长轴 out-of-plane 方向的几何膨胀因子。
affine-lambda-out = 1.05

# 说明：affine-gaussian 额外 evolution smoothing 宽度，单位 fm。
affine-sigma-evo = 0.5

# 说明：affine-effective 几何闭合参考时间，单位 fm/c；仅 affine-effective 路径使用。
affine-delta-tau-ref = 10.0

# 说明：affine-effective 横向流强系数；仅 affine-effective 路径使用。
affine-kappa-flow = 10.0

# 说明：旧 affine-effective 各向异性参数；当前 additive-rho/full-tensor 模式中为 legacy/no-op。
affine-kappa-aniso = 1.0

# 说明：affine-effective 横向速度上限；要求 0 到 1 之间。
affine-u-max = 0.95

# 说明：affine-effective 子模式；additive-rho 为默认，full-tensor 为 opt-in，本配置未启用 affine-effective。
affine-effective-mode = additive-rho

# 说明：density-normal 的显式 kappa2 补偿开关；只允许 affine-gaussian + density-normal。
density-normal-kappa-compensation = false

# 说明：是否写 flow_ellipse_debug 与归一化 participant 图。
debug-flow-ellipse = false

# 说明：V2 gradient-response 的发射 marker 额外平滑宽度，单位 fm；仅 gradient-response 路径使用。
gradient-sigma-em = 0.0

# 说明：V2 gradient-response 的动力学梯度额外平滑宽度，单位 fm；必须大于 gradient-sigma-em。
gradient-sigma-dyn = 1.0

# 说明：V2 gradient-response 计算梯度时的密度 floor 比例。
gradient-density-floor-fraction = 1.0e-4

# 说明：V2 gradient-response 接受 marker 样本时的密度 cutoff 比例。
gradient-density-cutoff-fraction = 1.0e-6

# 说明：V2 gradient-response 位移最大长度，单位 fm。
gradient-displacement-max = 1.5

# 说明：V2 gradient-response 位移响应长度尺度，单位 fm。
gradient-displacement-kappa = 1.0

# 说明：V2 gradient-response 可选 diffusion 宽度，单位 fm；0 表示关闭。
gradient-diffusion-sigma = 0.0

# 说明：V2 gradient-response 横向速度上限；要求 0 <= value < 1。
gradient-vmax = 0.75

# 说明：V2 gradient-response 速度响应长度尺度，单位 fm。
gradient-velocity-kappa = 1.0

# 说明：可选 Cooper-Frye 风格分析权重；none 表示 emission_weight 保持单位权重。
cooper-frye-weight = none

# 说明：是否写 V2 gradient-response 的四张密度调试图；仅 gradient-response 路径建议开启。
debug-gradient-response = false

# 说明：纵向 eta_s 高斯尾宽度。
sigma-eta = 1.5

# 说明：纵向 eta_s 平顶核心半宽。
eta-plateau = 1.0

# 说明：每个源点的平均发射强度。
nbd-mu = 2.0

# 说明：NBD-like Gamma-Poisson 涨落的形状参数。
nbd-k = 1.5
