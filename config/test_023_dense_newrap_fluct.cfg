# 三阶响应测试 V1 示例配置。
# 每个配置项前一行说明该项含义；配置值在下一行给出。
# 该文件在 response-test-023 下开启逐事件模板参数随机化，便于扩宽 eps2/eps3 分布。

# 说明：生成事件数；可在命令行用 --nevents 覆盖。
nevents = 5000

# 说明：初态几何来源；response-test-023 使用 0+2+3 人工模板。
initial-geometry = response-test-023

# 说明：是否开启逐事件随机化；固定 023 的默认基线请将本项改为 false。
initial-geometry-fluctuate = true

# 说明：每个事件总源点数的随机区间（正整数）。区间必须完整配置且满足 min <= max。
initial-geometry-source-count-min = 180
initial-geometry-source-count-max = 700

# 说明：固定 023 基线保留值；固定输出时也要保留对应基线参数。
initial-geometry-source-count = 600

# 说明：n=0 圆形背景高斯宽度，单位 fm；本轮方案不随机化。
initial-geometry-r0 = 1.8

# 说明：n=2 椭圆权重 a2 的随机区间。该值是模板权重，不是 eps2。
initial-geometry-a2-min = 0.0
initial-geometry-a2-max = 1.0

# 说明：n=2 椭圆 x 主轴高斯宽度区间，单位 fm；和 r2y 共同定义椭圆形状。
initial-geometry-r2x-min = 1.8
initial-geometry-r2x-max = 3.2

# 说明：n=2 椭圆 y 主轴高斯宽度区间，单位 fm；和 r2x 共同定义椭圆形状。
initial-geometry-r2y-min = 0.9
initial-geometry-r2y-max = 1.8

# 说明：n=2 椭圆权重 a2 固定基线值。
initial-geometry-a2 = 0.5

# 说明：n=2 椭圆模板方向角，单位 rad；本轮第一版不随机化。
initial-geometry-phi2 = 0.0

# 说明：n=3 三角权重 a3 的随机区间。该值是模板权重，不是 eps3；上限略高于首版建议值，用于让 eps3 p95 进入宽分布验收区间。
initial-geometry-a3-min = 0.0
initial-geometry-a3-max = 0.8

# 说明：n=3 hotspot 到原点的半径区间，单位 fm，决定三角结构的离心距离。
initial-geometry-r3-min = 1.4
initial-geometry-r3-max = 3.0

# 说明：单个三角 hotspot 的 Gaussian 宽度区间，单位 fm；越大越圆滑。
initial-geometry-sigma3-min = 0.45
initial-geometry-sigma3-max = 1.3

# 说明：n=3 权重 a3 固定基线值。
initial-geometry-a3 = 0.20

# 说明：n=3 hotspot 到原点半径的固定基线值；仅在关闭逐事件随机化时参与生成。
initial-geometry-r3 = 2.0

# 说明：单个三角 hotspot 宽度的固定基线值；仅在关闭逐事件随机化时参与生成。
initial-geometry-sigma3 = 1.2

# 说明：n=3 hotspot 环中心方向角，单位 rad；本轮第一版不随机化。
initial-geometry-phi3 = 0.0

# 说明：固定冲量参数 b，单位 fm；仅用于中心度映射与对照。
b = 8

# 说明：局域热动量抽样温度，单位 GeV。
temperature = 0.2

# 说明：默认 thermal 抽样器。
thermal-sampler = maxwell-juttner

# 说明：Maxwell-Juttner 查表上限，单位 GeV。
mj-pmax = 8.0

# 说明：Maxwell-Juttner 查表网格点数。
mj-grid-points = 4096

# 说明：冻结面 proper time，单位 fm/c。
tau0 = 10.0

# 说明：发射点高斯横向 smearing，单位 fm。
smear = 0.5

# 说明：核子-核子非弹截面参数，单位 fm^2。
sigma-nn = 7.0

# 说明：随机数种子；固定后保证事件与核外发射复现。
seed = 12345

# 说明：输出 ROOT 文件路径。
output = /Users/allenzhou/Research_software/Blast_wave/qa/test_023_dense_newrap_fluct.root

# 说明：是否显示生成进度。
progress = true

# 说明：v2{2}(pT) 可选分析 bin 边界，逗号分隔且严格递增。
v2pt-bins = 0.0,0.2,0.4,0.6,0.8,1.2,1.6,2.0,3.0,4.0,5.0,7.0

# 说明：v3{2}(pT) 可选分析 bin 边界，逗号分隔且严格递增。
v3pt-bins = 0.0,0.2,0.4,0.6,0.8,1.2,1.6,2.0,3.0,4.0,5.0,7.0

# 说明：差分 flow pT payload 写入模式；same-file 写入主 ROOT。
flowpt-output-mode = same-file

# 说明：横向流速基线；density-normal 与 affine-gaussian 场景都与此有关。

# 说明：横向流强模式；radius-profile 仅使用半径 profile，shell-gradient-corrected 需额外梯度修正参数。
flow-trans-magnitude-mode = radius-profile

# 说明：density-normal 的梯度响应份额；0 为纯几何膨胀，1 为纯局域密度梯度；0<f<1 时要求梯度方向至少保留 1-f 的全局外向投影，用于抑制 hotspot 造成的反向流。
flow-trans-direction-gradient-fraction = 0.8

flow-trans-radius = density-percentile:0.95

# 说明：横向流速强度随归一化半径幂指数。
flow-trans-profile-power = 1.0

# 说明：横向流速度采样器。
flow-velocity-sampler = density-normal

# 说明：介质演化模式。
density-evolution = none

# 说明：流场采样的核沉积宽度。
flow-density-sigma = 0.5

# 说明：是否输出 flow_ellipse_debug。
debug-flow-ellipse = false

# 说明：是否输出 initial_geometry_density_x-y。
debug-initial-geometry = true

# 说明：是否应用 Cooper-Frye 样条权重。
cooper-frye-weight = none

# 说明：纵向 eta_s 高斯尾宽度。
sigma-eta = 1.5

# 说明：纵向 eta_s 平顶核心半宽。
eta-plateau = 1.0

# 说明：每个源点平均发射 multiplicity 的 NBD 均值。
nbd-mu = 2.0

# 说明：每个源点 NBD fluctuation 形状参数。
nbd-k = 1.5
