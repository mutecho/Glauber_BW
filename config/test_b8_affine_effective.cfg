# Example affine-effective blast-wave generator config.
# Relative output paths resolve against this file's directory.

nevents = 5000
b = 8
temperature = 0.2
thermal-sampler = maxwell-juttner
progress = true
tau0 = 10.0
smear = 0.5
sigma-nn = 7.0
seed = 12345
output = /Users/allenzhou/Research_software/Blast_wave/qa/test_b8_affine_effective.root
v2pt-bins = 0.0,0.2,0.4,0.6,0.8,1.2,1.6,2.0,3.0,4.0,5.0,7.0
v2pt-output-mode = same-file

# Shared flow controls. rho0 / kappa2 stay public for the other samplers but
# are intentionally unused by affine-effective.
rho0 = 0.9
kappa2 = 0.06
flow-power = 1.0
flow-velocity-sampler = affine-effective
density-evolution = affine-gaussian
flow-density-sigma = 0.5
affine-lambda-in = 1.20
affine-lambda-out = 1.05
affine-sigma-evo = 0.5
affine-delta-tau-ref = 10.0
affine-kappa-flow = 10.0
affine-kappa-aniso = 1.0
affine-u-max = 0.95
# density-normal-kappa-compensation = false  # intentionally unused here
# debug-flow-ellipse = true
sigma-eta = 1.5
eta-plateau = 1.0
nbd-mu = 2.0
nbd-k = 1.5
debug-flow-ellipse = false
debug-gradient-response = false
