# affine-effective 示例配置；每个配置项前一行给出中文解释。
# 相对输出路径会按配置文件所在目录解析；这里使用绝对路径便于固定烟测产物位置。

# 生成事件数。
nevents = 5000
# 固定冲量参数 b，单位 fm。
b = 8
# 局域静止系热温度，单位 GeV。
temperature = 0.2
# 热动量抽样器；maxwell-juttner 是当前默认热采样模式。
thermal-sampler = maxwell-juttner
# 显示生成进度。
progress = true
# freeze-out proper time，单位 fm/c。
tau0 = 10.0
# legacy hotspot 横向 smear 宽度，单位 fm；当前 affine-gaussian 主链仍保留该输入。
smear = 0.5
# 核子-核子非弹截面，单位 fm^2。
sigma-nn = 7.0
# 随机数种子。
seed = 12345
# 主 ROOT 输出文件。
output = /Users/allenzhou/Research_software/Blast_wave/qa/test_b8_affine_effective.root
# 差分 v2{2}(pT) 的 pT bin 边界；设置后会写出 v2_2_pt_edges。
v2pt-bins = 0.0,0.2,0.4,0.6,0.8,1.2,1.6,2.0,3.0,4.0,5.0,7.0
# 差分 v2{2}(pT) payload 写回同一个 ROOT 文件。
v2pt-output-mode = same-file

# additive-rho 子模式下 rho0 是 baseline 平均流强；full-tensor 子模式不使用 rho0。
rho0 = 0.9
# kappa2 保留给 covariance-ellipse 和 density-normal 补偿路径；当前 affine-effective 不使用。
kappa2 = 0.06
# rTilde 径向 profile 的幂指数。
flow-power = 1.0
# 选择 affine-effective 横向流速 sampler。
flow-velocity-sampler = affine-effective
# affine-effective 必须与 affine-gaussian 介质演化联合使用。
density-evolution = affine-gaussian
# affine-effective 子模式；默认 additive-rho = 密度法向方向 + rho0 baseline + affine 几何修正。
affine-effective-mode = additive-rho
# Gaussian point-cloud density 沉积宽度，单位 fm。
flow-density-sigma = 1.5
# affine-gaussian 中短轴 in-plane 方向的几何膨胀因子。
affine-lambda-in = 1.20
# affine-gaussian 中长轴 out-of-plane 方向的几何膨胀因子。
affine-lambda-out = 1.05
# affine-gaussian 额外 evolution smoothing 宽度，单位 fm。
affine-sigma-evo = 0.2
# affine-effective 将累计几何增长映射为有效膨胀率的参考时间尺度，单位 fm/c。
affine-delta-tau-ref = 10.0
# affine-effective 几何闭合的整体流强度系数。
affine-kappa-flow = 10.0
# affine-effective 局域横向速度上限，要求 0 < affine-u-max < 1。
affine-u-max = 0.95
# density-normal-kappa-compensation 只对 affine-gaussian + density-normal 有效；当前 sampler 下不启用。
# density-normal-kappa-compensation = false
# debug-flow-ellipse=true 会写 flow_ellipse_debug，并包含 affine_effective_mode 与 surface rho 分解诊断。
# debug-flow-ellipse = true

# space-time rapidity 高斯尾宽度。
sigma-eta = 1.5
# space-time rapidity 平顶核心半宽。
eta-plateau = 1.0
# 每个 hotspot 的 NBD 平均发射强度。
nbd-mu = 2.0
# NBD 形状参数。
nbd-k = 1.5
# 默认不写 flow ellipse debug；ROOT 烟测可用 CLI 加 --debug-flow-ellipse 覆盖。
debug-flow-ellipse = false
# 当前配置不启用 V2 gradient-response debug。
debug-gradient-response = false
