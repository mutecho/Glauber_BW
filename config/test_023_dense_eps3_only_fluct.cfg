# 三阶-only 交叉性控制配置。
# 每个配置项前一行说明该项含义；配置值在下一行给出。
# 该文件只随机化 A3，用于检查三阶宽分布是否通过 1:A2:A3 分配竞争诱发 eps2 相关。

# 说明：生成事件数；可在命令行用 --nevents 覆盖。
nevents = 5000

# 说明：初态几何来源；response-test-023 使用 0+2+3 人工模板。
initial-geometry = response-test-023

# 说明：开启逐事件随机化；本控制样本只有 A3 区间是真正打开的。
initial-geometry-fluctuate = true

# 说明：每个事件总源点数退化为固定值，避免总 multiplicity 宽分布参与交叉相关。
initial-geometry-source-count-min = 600
initial-geometry-source-count-max = 600

# 说明：固定 023 基线保留值；关闭 fluctuation 时也能复用同一配置语义。
initial-geometry-source-count = 600

# 说明：n=0 圆形背景高斯宽度，单位 fm；本控制样本不随机化。
initial-geometry-r0 = 1.8

# 说明：n=2 椭圆权重 A2 退化为固定值，用于隔离三阶随机化。
initial-geometry-a2-min = 0.5
initial-geometry-a2-max = 0.5

# 说明：n=2 椭圆 x 主轴高斯宽度退化为固定值，单位 fm。
initial-geometry-r2x-min = 2.4
initial-geometry-r2x-max = 2.4

# 说明：n=2 椭圆 y 主轴高斯宽度退化为固定值，单位 fm。
initial-geometry-r2y-min = 1.3
initial-geometry-r2y-max = 1.3

# 说明：n=2 椭圆权重固定基线值；与上面的退化区间保持一致。
initial-geometry-a2 = 0.5

# 说明：n=2 椭圆模板方向角，单位 rad；本控制样本不随机化平面角。
initial-geometry-phi2 = 0.0

# 说明：n=3 三角权重 A3 的随机区间；该值是模板权重，不是 eps3。
initial-geometry-a3-min = 0.0
initial-geometry-a3-max = 0.8

# 说明：n=3 hotspot 到原点的半径退化为固定值，单位 fm。
initial-geometry-r3-min = 2.0
initial-geometry-r3-max = 2.0

# 说明：单个三角 hotspot 的 Gaussian 宽度退化为固定值，单位 fm。
initial-geometry-sigma3-min = 1.2
initial-geometry-sigma3-max = 1.2

# 说明：n=3 权重固定基线值；仅在关闭逐事件随机化时参与生成。
initial-geometry-a3 = 0.20

# 说明：n=3 hotspot 到原点半径的固定基线值，单位 fm。
initial-geometry-r3 = 2.0

# 说明：单个三角 hotspot 宽度的固定基线值，单位 fm。
initial-geometry-sigma3 = 1.2

# 说明：n=3 hotspot 环中心方向角，单位 rad；本控制样本不随机化平面角。
initial-geometry-phi3 = 0.0

# 说明：固定冲量参数 b，单位 fm；仅用于中心度映射与对照。
b = 8

# 说明：局域热动量抽样温度，单位 GeV。
temperature = 0.2

# 说明：默认 thermal 抽样器。
thermal-sampler = maxwell-juttner

# 说明：Maxwell-Juttner 查表上限，单位 GeV。
mj-pmax = 8.0

# 说明：Maxwell-Juttner 查表网格点数。
mj-grid-points = 4096

# 说明：冻结面 proper time，单位 fm/c。
tau0 = 10.0

# 说明：发射点高斯横向 smearing，单位 fm。
smear = 0.5

# 说明：核子-核子非弹截面参数，单位 fm^2；模板模式不用于源点生成。
sigma-nn = 7.0

# 说明：随机数种子；固定后保证控制样本可复现。
seed = 12345

# 说明：默认输出 ROOT 文件路径；交叉性测试可用 --output 覆盖到 /private/tmp。
output = /Users/allenzhou/Research_software/Blast_wave/qa/test_023_dense_eps3_only_fluct.root

# 说明：是否显示生成进度。
progress = true

# 说明：v2{2}(pT) 可选分析 bin 边界，逗号分隔且严格递增。
v2pt-bins = 0.0,0.2,0.4,0.6,0.8,1.2,1.6,2.0,3.0,4.0,5.0,7.0

# 说明：v3{2}(pT) 可选分析 bin 边界，逗号分隔且严格递增。
v3pt-bins = 0.0,0.2,0.4,0.6,0.8,1.2,1.6,2.0,3.0,4.0,5.0,7.0

# 说明：差分 flow pT payload 写入模式；same-file 写入主 ROOT。
flowpt-output-mode = same-file

# 说明：横向流速基线；density-normal 与 affine-gaussian 场景都与此有关。
flow-trans-rho0 = 0.9

# 说明：横向流速强度随归一化半径幂指数。
flow-trans-profile-power = 1.0

# 说明：横向流速度采样器；使用 density-normal 检查完整密度梯度链路中的交叉项。
flow-velocity-sampler = density-normal

# 说明：介质演化模式；none 保留 response-test closure 控制路径。
density-evolution = none

# 说明：流场采样的核沉积宽度。
flow-density-sigma = 0.5

# 说明：是否输出 flow_ellipse_debug。
debug-flow-ellipse = false

# 说明：是否输出 initial_geometry_density_x-y。
debug-initial-geometry = true

# 说明：是否应用 Cooper-Frye 样条权重。
cooper-frye-weight = none

# 说明：纵向 eta_s 高斯尾宽度。
sigma-eta = 1.5

# 说明：纵向 eta_s 平顶核心半宽。
eta-plateau = 1.0

# 说明：每个源点平均发射 multiplicity 的 NBD 均值。
nbd-mu = 2.0

# 说明：每个源点 NBD fluctuation 形状参数。
nbd-k = 1.5
